<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام 513 الاحترافي v5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --card: #ffffff; --txt: #0f172a; --s: #10b981; --d: #ef4444; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 10px; }
        .header { background: var(--p); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 5px solid var(--p); }
        .card-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bal { background: #1e293b; color: white; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; text-align: center; }
        .s-box { background: #f1f5f9; padding: 8px 2px; border-radius: 8px; }
        .s-lbl { font-size: 0.65rem; color: #64748b; display: block; }
        .s-val { font-weight: bold; font-size: 1rem; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        button { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.9); }
        .b-plus { background: var(--s); } .b-minus { background: var(--d); } .b-ret { background: #f59e0b; color: black; }
        .edit-zone { display: flex; gap: 5px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        input { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; text-align: center; }
        #sync { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 5px 20px; border-radius: 20px; font-size: 12px; display: none; }
    </style>
</head>
<body>

<div id="sync">جاري المزامنة...</div>

<div class="header">
    <h2 style="margin:0 0 10px 0;">نظام الإدارة الشامل</h2>
    <input type="date" id="mDate" onchange="fetchData()" style="padding:10px; border-radius:8px; width:80%;">
</div>

<div id="grid"></div>

<script>
    // --- ضع رابطك هنا ---
    const URL = "https://script.google.com/macros/s/AKfycbzlNw95iTW4K7lrHAGWr_sSS6mELbVaxNqc0ly9B_Kj9zjbO4myFZ_MaJFFmbKfTHLH/exec";
    
    const ITEMS = ["CH30", "LR", "PR", "CP", "EDAHABIA", "CODE"];
    let DB = [];

    document.getElementById('mDate').valueAsDate = new Date();

    async function fetchData() {
        document.getElementById('sync').style.display = 'block';
        try {
            const r = await fetch(URL);
            DB = await r.json();
            render();
        } catch(e) { console.error("Error"); }
        document.getElementById('sync').style.display = 'none';
    }

    function render() {
        const grid = document.getElementById('grid');
        const selDate = new Date(document.getElementById('mDate').value);
        selDate.setHours(0,0,0,0);
        grid.innerHTML = "";

        // معالجة البيانات مسبقاً لزيادة السرعة
        const sortedLogs = DB.slice(1).map(l => ({
            date: new Date(l[0]),
            item: l[1],
            type: l[2],
            amt: parseFloat(l[3]) || 0
        })).sort((a,b) => a.date - b.date);

        ITEMS.forEach(item => {
            let s = { prev: 0, in: 0, out: 0, ret: 0 };
            
            sortedLogs.filter(l => l.item === item).forEach(l => {
                const d = new Date(l.date); d.setHours(0,0,0,0);
                if (d < selDate) {
                    if (l.type === "دخل" || l.type === "Initial") s.prev += l.amt;
                    else if (l.type === "خرج" || l.type === "RETOUR") s.prev -= l.amt;
                    else if (l.type === "Adjustment") s.prev = l.amt;
                } else if (d.getTime() === selDate.getTime()) {
                    if (l.type === "دخل") s.in += l.amt;
                    else if (l.type === "خرج") s.out += l.amt;
                    else if (l.type === "RETOUR") s.ret += l.amt;
                    else if (l.type === "Adjustment") { s.prev = l.amt; s.in = 0; s.out = 0; s.ret = 0; }
                }
            });

            const currentBal = (s.prev + s.in) - (s.out + s.ret);

            grid.innerHTML += `
                <div class="card">
                    <div class="card-h"><b>${item}</b> <span class="bal" id="bal-${item}">${currentBal}</span></div>
                    <div class="stats">
                        <div class="s-box"><span class="s-lbl">سابق</span><span class="s-val">${s.prev}</span></div>
                        <div class="s-box" style="color:var(--s)"><span class="s-lbl">دخل</span><span class="s-val" id="in-${item}">+${s.in}</span></div>
                        <div class="s-box" style="color:var(--d)"><span class="s-lbl">خرج</span><span class="s-val" id="out-${item}">-${s.out}</span></div>
                        <div class="s-box" style="color:#f59e0b"><span class="s-lbl">مرجع</span><span class="s-val" id="ret-${item}">-${s.ret}</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="b-plus" onclick="quickAction('${item}','دخل',1)">+1</button>
                        <button class="b-minus" onclick="quickAction('${item}','خرج',1)">-1</button>
                        <button class="b-ret" onclick="quickAction('${item}','RETOUR',1)">مرجع</button>
                    </div>
                    <div class="edit-zone">
                        <input type="number" id="amt-${item}" placeholder="كمية">
                        <button onclick="manualAdd('${item}')" style="background:#475569; flex:1;">تعديل مخصص / جرد</button>
                    </div>
                </div>`;
        });
    }

    // إضافة فورية دون انتظار السيرفر لزيادة السرعة
    function quickAction(item, type, amt) {
        // تحديث الواجهة فوراً (Optimistic UI)
        const inEl = document.getElementById(`in-${item}`);
        const outEl = document.getElementById(`out-${item}`);
        const retEl = document.getElementById(`ret-${item}`);
        const balEl = document.getElementById(`bal-${item}`);

        let val = parseFloat(balEl.innerText);
        if(type === 'دخل') { 
            val += amt; 
            inEl.innerText = "+" + (parseFloat(inEl.innerText.replace('+','')) + amt);
        } else { 
            val -= amt; 
            if(type === 'خرج') outEl.innerText = "-" + (parseFloat(outEl.innerText.replace('-','')) + amt);
            if(type === 'RETOUR') retEl.innerText = "-" + (parseFloat(retEl.innerText.replace('-','')) + amt);
        }
        balEl.innerText = val;

        // الإرسال في الخلفية
        sendToServer(item, type, amt);
    }

    async function sendToServer(item, type, amount) {
        const date = document.getElementById('mDate').value;
        document.getElementById('sync').style.display = 'block';
        await fetch(URL, {
            method: "POST",
            body: JSON.stringify({ item, type, amount, date })
        });
        document.getElementById('sync').style.display = 'none';
        // لا نحتاج لإعادة التحديث بالكامل فوراً لضمان السرعة، سيتم التحديث في الخلفية
    }

    function manualAdd(item) {
        const amt = parseFloat(document.getElementById(`amt-${item}`).value);
        if(isNaN(amt)) return alert("ادخل رقم");
        // التعديل أو الكميات الكبيرة يفضل انتظار السيرفر فيها لضمان الدقة
        sendToServer(item, 'Adjustment', amt).then(() => fetchData());
    }

    fetchData();
</script>
</body>
</html>
