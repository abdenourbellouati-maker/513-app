<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام 513 - التسلسل السحابي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f0f4f8; --text: #333; --success: #28a745; --danger: #dc3545; --warning: #fd7e14; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header-card { background: var(--primary); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .date-picker-container { background: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; border-right: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-name { font-weight: bold; font-size: 1.2rem; color: var(--primary); }
        .total-balance { background: #343a40; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; text-align: center; }
        .stat-box { background: #f8f9fa; padding: 8px 2px; border-radius: 8px; border: 1px solid #eee; }
        .stat-label { font-size: 0.7rem; color: #666; display: block; }
        .stat-val { font-weight: bold; font-size: 1rem; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        .btn-ret { background: var(--warning); }
        
        .loading { display: none; text-align: center; padding: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="header-card">
    <h2 style="margin:0">نظام 513 - التسلسل السحابي</h2>
    <div id="liveClock" style="font-size: 0.8rem; margin-top:5px; opacity: 0.9;"></div>
</div>

<div class="date-picker-container">
    <input type="date" id="selectedDate" onchange="fetchData()" style="padding:8px; border-radius:5px; border:1px solid #ddd;">
</div>

<div id="loadingIndicator" class="loading">جاري مزامنة البيانات...</div>

<div id="mainGrid"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyaNujQ7MVEe5fHUEr6iK1hoObeREbAcF-wez-n__szb8wO-Q2eO4UheOwcW36NqNms/exec";
    const items = ["CH30", "LR", "PR", "CP", "EDAHABIA", "CODE"];
    
    // ضبط التاريخ الافتراضي لليوم
    document.getElementById('selectedDate').valueAsDate = new Date();

    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleString('ar-DZ');
    }
    setInterval(updateClock, 1000);

    async function fetchData() {
        document.getElementById('loadingIndicator').style.display = 'block';
        try {
            const response = await fetch(API_URL);
            const fullData = await response.json();
            render(fullData);
        } catch (e) { alert("فشل في جلب البيانات"); }
        document.getElementById('loadingIndicator').style.display = 'none';
    }

    function render(allLogs) {
        const grid = document.getElementById('mainGrid');
        const targetDateStr = document.getElementById('selectedDate').value;
        const targetDate = new Date(targetDateStr);
        targetDate.setHours(0,0,0,0);

        grid.innerHTML = "";
        
        items.forEach(item => {
            let stats = { previous: 0, in: 0, out: 0, retour: 0 };

            allLogs.slice(1).forEach(row => {
                const logDate = new Date(row[0]);
                logDate.setHours(0,0,0,0);
                
                if (row[1] === item) {
                    const amount = parseFloat(row[3]) || 0;
                    const type = row[2];

                    if (logDate < targetDate) {
                        // حساب الرصيد السابق التراكمي
                        if (type === "دخل" || type === "Initial") stats.previous += amount;
                        else if (type === "خرج" || type === "RETOUR") stats.previous -= amount;
                        else if (type === "Adjustment") stats.previous = amount;
                    } 
                    else if (logDate.getTime() === targetDate.getTime()) {
                        // حساب حركات اليوم المحدد
                        if (type === "دخل") stats.in += amount;
                        else if (type === "خرج") stats.out += amount;
                        else if (type === "RETOUR") stats.retour += amount;
                        else if (type === "Adjustment") stats.previous = amount; // إذا عدل اليوم نعتبره البداية
                    }
                }
            });

            const currentBalance = (stats.previous + stats.in) - (stats.out + stats.retour);

            grid.innerHTML += `
                <div class="item-card">
                    <div class="item-header">
                        <div class="item-name">${item}</div>
                        <div class="total-balance">الرصيد: ${currentBalance}</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">سابق</span><span class="stat-val">${stats.previous}</span></div>
                        <div class="stat-box"><span class="stat-label">دخل</span><span class="stat-val">${stats.in}</span></div>
                        <div class="stat-box"><span class="stat-label">خرج</span><span class="stat-val">${stats.out}</span></div>
                        <div class="stat-box"><span class="stat-label">مرجع</span><span class="stat-val">${stats.retour}</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-in" onclick="sendAction('${item}', 'دخل')">+ دخل</button>
                        <button class="btn btn-out" onclick="sendAction('${item}', 'خرج')">- خرج</button>
                        <button class="btn btn-ret" onclick="sendAction('${item}', 'RETOUR')">↩ مرجع</button>
                    </div>
                </div>`;
        });
    }

    async function sendAction(item, type) {
        let amount = prompt(`إدخال كمية (${type}) لـ ${item}:`, "1");
        if (!amount || isNaN(amount)) return;

        document.getElementById('loadingIndicator').style.display = 'block';
        
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ 
                item: item, 
                type: type, 
                amount: parseFloat(amount), 
                notes: "تحديث من الواجهة" 
            })
        });
        
        fetchData(); // إعادة تحديث البيانات
    }

    fetchData();
</script>
</body>
</html>
