<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام 513 المحاسبي - التسلسل الدقيق</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --card: #ffffff; --text: #333; --success: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .app-header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; font-weight: bold; }
        .date-container { background: white; padding: 15px; border-radius: 12px; margin: 15px 0; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="date"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 5px solid var(--primary); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .balance-box { background: #333; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px 2px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-label { font-size: 0.7rem; color: #666; display: block; margin-bottom: 3px; }
        .stat-val { font-weight: bold; font-size: 1.1rem; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        .btn-ret { background: var(--warning); color: #000; }
        
        .adj-area { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; display: flex; gap: 10px; align-items: center; }
        .adj-input { width: 100px; padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
        
        #loader { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>

<div class="app-header">نظام 513 - التسلسل المحاسبي</div>

<div class="date-container">
    <input type="date" id="currentDate" onchange="loadData()">
    <button onclick="loadData()" style="background:none; border:none; font-size:1.2rem;">🔄</button>
</div>

<div id="grid"></div>
<div id="loader">جاري التحديث...</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyaNujQ7MVEe5fHUEr6iK1hoObeREbAcF-wez-n__szb8wO-Q2eO4UheOwcW36NqNms/exec";
    const ITEMS = ["CH30", "LR", "PR", "CP", "EDAHABIA", "CODE"];
    let LOGS = [];

    document.getElementById('currentDate').valueAsDate = new Date();

    async function loadData() {
        document.getElementById('loader').style.display = 'block';
        const res = await fetch(API_URL);
        LOGS = await res.json();
        render();
        document.getElementById('loader').style.display = 'none';
    }

    function render() {
        const grid = document.getElementById('grid');
        const selectedDate = new Date(document.getElementById('currentDate').value);
        selectedDate.setHours(0,0,0,0);
        
        grid.innerHTML = "";

        ITEMS.forEach(item => {
            let stats = { previous: 0, in: 0, out: 0, ret: 0 };
            
            // ترتيب البيانات زمنياً
            const sorted = LOGS.slice(1).sort((a,b) => new Date(a[0]) - new Date(b[0]));

            sorted.forEach(row => {
                const rowDate = new Date(row[0]);
                rowDate.setHours(0,0,0,0);
                if(row[1] !== item) return;

                const type = row[2];
                const amt = parseFloat(row[3]) || 0;

                if(rowDate < selectedDate) {
                    // بناء الرصيد التراكمي السابق (وراثة الأيام الماضية)
                    if(type === "دخل" || type === "Initial") stats.previous += amt;
                    else if(type === "خرج" || type === "RETOUR") stats.previous -= amt;
                    else if(type === "Adjustment") stats.previous = amt; 
                } 
                else if(rowDate.getTime() === selectedDate.getTime()) {
                    // حركات اليوم المختار حصراً
                    if(type === "دخل") stats.in += amt;
                    else if(type === "خرج") stats.out += amt;
                    else if(type === "RETOUR") stats.ret += amt;
                    else if(type === "Adjustment") {
                        // إذا تم التعديل اليوم، يُلغى كل ما سبقه ويصبح هذا الرقم هو نقطة البداية
                        stats.previous = amt; stats.in = 0; stats.out = 0; stats.ret = 0;
                    }
                }
            });

            const finalBalance = (stats.previous + stats.in) - (stats.out + stats.ret);

            grid.innerHTML += `
                <div class="item-card">
                    <div class="card-top">
                        <span style="font-weight:bold; font-size:1.2rem;">${item}</span>
                        <div class="balance-box">الرصيد النهائي: ${finalBalance}</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">سابق</span><span class="stat-val">${stats.previous}</span></div>
                        <div class="stat-box" style="color:green"><span class="stat-label">دخل اليوم</span><span class="stat-val">${stats.in}</span></div>
                        <div class="stat-box" style="color:red"><span class="stat-label">خرج اليوم</span><span class="stat-val">${stats.out}</span></div>
                        <div class="stat-box" style="color:orange"><span class="stat-label">مرجع</span><span class="stat-val">${stats.ret}</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-in" onclick="post('${item}','دخل',1)">+1</button>
                        <button class="btn btn-out" onclick="post('${item}','خرج',1)">-1</button>
                        <button class="btn btn-ret" onclick="post('${item}','RETOUR',1)">R</button>
                    </div>
                    <div class="adj-area">
                        <span style="font-size:0.8rem;">تعديل الرصيد (جرد):</span>
                        <input type="number" id="inp-${item}" class="adj-input" placeholder="0">
                        <button onclick="applyAdj('${item}')" style="background:#666; color:white; border:none; padding:8px 15px; border-radius:5px;">حفظ</button>
                    </div>
                </div>`;
        });
    }

    async function post(item, type, amount) {
        const date = document.getElementById('currentDate').value;
        // تحديث مرئي فوري
        LOGS.push([new Date(date), item, type, amount]);
        render();

        document.getElementById('loader').style.display = 'block';
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ item, type, amount, date })
        });
        document.getElementById('loader').style.display = 'none';
        loadData(); // إعادة الجلب للتأكد من المزامنة
    }

    function applyAdj(item) {
        const val = document.getElementById(`inp-${item}`).value;
        if(val === "") return;
        post(item, 'Adjustment', parseFloat(val));
    }

    loadData();
</script>
</body>
</html>
